<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotholeGuard AI | Real-time Edge Monitoring</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --alert: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--card);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .logo span { color: var(--primary); }

        main {
            flex: 1;
            padding: 2rem;
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar { gap: 1.5rem; }

        .stat-card {
            padding: 1.5rem;
            background: #f1f5f9;
            border-radius: 1rem;
            text-align: center;
        }

        .stat-label { font-size: 0.8rem; font-weight: 600; color: var(--text-sub); text-transform: uppercase; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2.5rem; font-weight: 800; }

        #alert-panel {
            flex: 1;
            border: 2px solid transparent;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #alert-panel.pothole-active {
            border-color: var(--alert);
            background: #fff1f2;
        }

        #alert-panel.pothole-active h1 { color: var(--alert); }

        .chart-card { flex: 1; position: relative; }
        
        #accelChart { width: 100%; height: 100%; }

        .threshold-indicator {
            position: absolute;
            right: 1.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--alert);
            background: white;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--alert);
            z-index: 10;
        }

    </style>
</head>
<body>
    <header>
        <div class="logo">Pothole<span>Guard</span> AI</div>
        <div id="live-indicator" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; font-weight: 700; color: var(--success);">
            <div style="width: 10px; height: 10px; background: var(--success); border-radius: 50%; animate: pulse 2s infinite;"></div>
            CONTINUOUS SIMULATION ACTIVE
        </div>
    </header>

    <main>
        <div class="sidebar">
            <div class="card stat-card">
                <div class="stat-label">Current Z-Force</div>
                <div class="stat-value" id="z-val">1.00</div>
                <div style="font-size: 0.75rem; color: var(--text-sub)">Gravity Normalized (1.0 = Resting)</div>
            </div>

            <div class="card" id="alert-panel">
                <div id="status-icon" style="margin-bottom: 1rem;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--success);"><circle cx="12" cy="12" r="10"></circle><polyline points="16 12 12 8 8 12"></polyline><line x1="12" y1="16" x2="12" y2="8"></line></svg>
                </div>
                <h1 id="status-text" style="font-size: 1.5rem; font-weight: 800;">Road Surface: Smooth</h1>
                <p id="sub-status" style="color: var(--text-sub); margin-top: 0.5rem; font-size: 0.9rem;">Edge detection monitoring active</p>
            </div>
        </div>

        <div class="card chart-card">
            <div class="threshold-indicator" style="top: 22%;">SPIKE THRESHOLD (+1.5g)</div>
            <div class="threshold-indicator" style="bottom: 22%;">DIP THRESHOLD (-1.5g)</div>
            <canvas id="accelChart"></canvas>
        </div>
    </main>

    <script>
        const ctx = document.getElementById('accelChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(60).fill(""),
                datasets: [{
                    label: 'Vertical Acceleration',
                    data: Array(60).fill(1.0),
                    borderColor: '#4f46e5',
                    backgroundColor: 'rgba(79, 70, 229, 0.05)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { display: false },
                    y: { 
                        min: -1, 
                        max: 5,
                        grid: { color: '#f1f5f9' }
                    }
                },
                plugins: { 
                    legend: { display: false },
                    tooltip: { enabled: false }
                }
            }
        });

        const ws = new WebSocket(`ws://${window.location.host}/ws`);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'telemetry') {
                updateVisuals(data);
            } else if (data.type === 'alert') {
                triggerDetection(data);
            }
        };

        function updateVisuals(data) {
            document.getElementById('z-val').innerText = data.accel_z.toFixed(2);
            chart.data.datasets[0].data.push(data.accel_z);
            chart.data.datasets[0].data.shift();
            chart.update('none');
        }

        let alertTimeout;
        function triggerDetection(data) {
            const panel = document.getElementById('alert-panel');
            const statusText = document.getElementById('status-text');
            const subStatus = document.getElementById('sub-status');
            const statusIcon = document.getElementById('status-icon');

            panel.classList.add('pothole-active');
            statusText.innerText = "POTHOLE DETECTED!";
            subStatus.innerText = "Edge threshold exceeded (Z-Spike)";
            statusIcon.innerHTML = `<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12" y2="17"></line></svg>`;

            clearTimeout(alertTimeout);
            alertTimeout = setTimeout(() => {
                panel.classList.remove('pothole-active');
                statusText.innerText = "Road Surface: Smooth";
                subStatus.innerText = "Edge detection monitoring active";
                statusIcon.innerHTML = `<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="16 12 12 8 8 12"></polyline><line x1="12" y1="16" x2="12" y2="8"></line></svg>`;
            }, 3000);
        }
    </script>
</body>
</html>
